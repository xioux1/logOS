databases:
  - name: logos-db
    databaseName: logos
    plan: free

services:
  - type: web
    name: logos-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: logos-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PWA_ORIGIN
        sync: false
      - key: DISCRIMINADOR_ORIGIN
        sync: false
      - key: DISCRIMINADOR_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  - type: web
    name: logos-pwa
    runtime: static
    rootDir: pwa
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
